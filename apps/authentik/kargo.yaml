chart:
  targetRevision: 0.0.49
kargo:
  warehouse:
    image:
      repoURL: ghcr.io/goauthentik/server
      discoveryLimit: 7
      constraint: ''
      allowTags: ''
      ignoreTags:
        - '.*rc-\d+$'
    chart:
      repoURL: https://charts.goauthentik.io
      name: authentik
  config:
    enabled: true
    warehouse:
      chart:
        name: authentik-config
  promotionTasks:
    imageVersion:
      tagKey: global.image.tag
extSecrets:
  - name: github-ssh
    namespace: authentik
    labels:
      kargo.akuity.io/cred-type: git
    secrets:
      - secretKey: repoURL
        remoteRef:
          key: secret/kargo/github
          property: repo_url
      - secretKey: sshPrivateKey
        remoteRef:
          key: secret/kargo/github
          property: ssh_private_key