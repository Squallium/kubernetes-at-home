chart:
  targetRevision: 0.0.49
kargo:
  warehouse:
    chart:
      repoURL: https://prometheus-community.github.io/helm-charts
      name: kube-prometheus-stack
  stages:
    dev:
      enabled: true
    pro:
      enabled: true
    core:
      enabled: true
extSecrets:
  - name: github-ssh
    namespace: kube-prometheus-stack-core
    labels:
      kargo.akuity.io/cred-type: git
    secrets:
      - secretKey: repoURL
        remoteRef:
          key: secret/kargo/github
          property: repo_url
      - secretKey: sshPrivateKey
        remoteRef:
          key: secret/kargo/github
          property: ssh_private_key