server:
  persistence:
    enabled: true
    useExistingPersistentVolume: true
    storageClass: manual
    hostPath: /mnt/services/media/fotos

ingress:
  enabled: true

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL