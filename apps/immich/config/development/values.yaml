extSecrets:
  - name: postgresql-auth
    templateType: Opaque
    secrets:
      - secretKey: postgres-password
        remoteRef:
          key: secret/immich/development/postgres-auth
          property: password
      - secretKey: user-password
        remoteRef:
          key: secret/immich/development/postgres-auth
          property: user-password
  - name: valkey-auth
    templateType: Opaque
    secrets:
      - secretKey: valkey-password
        remoteRef:
          key: secret/immich/development/valkey-auth
          property: password