applicationsets:
  core-addons-seetup:
    namespace: argocd
    additionalLabels: {}
    additionalAnnotations: {}
    finalizers:
      - resources-finalizer.argocd.argoproj.io
    # See PR #10026 (ArgoCD v2.5 or later)
    # goTemplate: false
    goTemplate: true
    goTemplateOptions: [ "missingkey=error" ]
    generators:
      - matrix:
          generators:
            - list:
                elements:
                  {%- for core_addon in cookiecutter.core_addons.list %}
                  - name: '{{ core_addon.name }}'
                    serverSideApply: {{ 'true' if core_addon.get("server_side_apply", False) else 'false' }}
                    promotion: {{ "kargo" if core_addon.get("enable_kargo", False) else "manual" }}
                    kargoStage: 'core'
                  {%- endfor %}
            - git:
                repoURL: https://github.com/Squallium/kubernetes-at-home.git
                revision: main
                files:
                  - path: 'addons/{{'{{'}} .name }}/config.yaml'
    # Ref https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Controlling-Resource-Modification/#allow-temporarily-toggling-auto-sync
    ignoreApplicationDifferences:
      - jsonPointers:
          - /spec/syncPolicy
    # Progressive Syncs is an experimental feature and it must be explicitly enabled
    # Ref: https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Progressive-Syncs/#enabling-progressive-syncs
    #      strategy:
    #        type: RollingSync
    #        rollingSync:
    #          steps:
    #          - matchExpressions:
    #            - key: project
    #              operator: In
    #              values:
    #              - guestbook
    #          - matchExpressions:
    #            - key: project
    #              operator: In
    #              values:
    #              - kustomize-foo
    #              - kustomize-bar
    template:
      metadata:
        name: '{{'{{'}} .name }}'
        labels:
          type: 'addon'
          promotion: '{{'{{'}} .promotion }}'
        annotations:
          kargo.akuity.io/authorized-stage: 'addon-{{'{{'}} .name }}:{{'{{'}} .kargoStage }}'
      spec:
        project: default
        sources:
          - repoURL: https://github.com/Squallium/kubernetes-at-home.git
            targetRevision: main
            ref: values
          - repoURL: '{{'{{'}}.chart.repoURL}}'
            chart: '{{'{{'}}.chart.name}}'
            targetRevision: '{{'{{'}}.chart.targetRevision}}'
            helm:
              valueFiles:
                - '$values/addons/{{'{{'}} .name }}/values.yaml'
        destination:
          server: https://kubernetes.default.svc
          namespace: '{{'{{'}} .name }}'
        syncPolicy:
#            automated:
#              prune: false
#              selfHeal: false
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply={{'{{'}} .serverSideApply }}
        ignoreDifferences:
          - group: apps
            kind: Deployment
            jsonPointers:
              - /spec/replicas
        info:
          - name: url
            value: https://argoproj.github.io/
    syncPolicy:
      # Set Application finalizer
      preserveResourcesOnDeletion: true
    # Templating is only available on string type
  #      templatePatch: |
  #        spec:
  #          source:
  #            helm:
  #              valueFiles:
  #              {{'{{'}}- range $valueFile := .valueFiles }}
  #                - {{'{{'}} $valueFile }}
  #              {{'{{'}}- end }}
  #        {{'{{'}}- if .autoSync }}
  #          syncPolicy:
  #            automated:
  #              prune: {{'{{'}} .prune }}
  #        {{'{{'}}- end }}
