apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certIssuer.name }}
spec:
  ca:
    secretName: {{ .Values.certAuthoritySecret.name }}
{{- if .Values.letsEncrypt.enable }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.letsEncrypt.issuerName }}
spec:
  acme:
    email: {{ .Values.letsEncrypt.email }}
    server: {{ .Values.letsEncrypt.server }}
    privateKeySecretRef:
      name: {{ .Values.letsEncrypt.issuerName }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
{{- end }}