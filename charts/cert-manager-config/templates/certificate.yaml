{{- range $certificate := .Values.certificates }}
{{- $domain := $certificate.domain | default "internal" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $certificate.name }}-internal-cert
  namespace: {{ $certificate.namespace }}
spec:
  secretName: {{ $certificate.name }}-internal-tls
  duration: {{ $certificate.duration | default "8760h" }} # 1 year
  renewBefore: {{ $certificate.renewBefore | default "720h" }} # 30 days
  subject:
    organizations:
      - HomeInternal
  commonName: {{ $certificate.name }}.{{ $domain }}
  dnsNames:
    - {{ $certificate.name }}.{{ $domain }}
  issuerRef:
    name: {{ $.Values.certIssuer.name }}
    kind: ClusterIssuer
---
{{- end }}
{{- if .Values.letsEncrypt.enable }}

{{- $namespaces := .Values.letsEncrypt.namespaces | default list }}
{{- $namespaces = append $namespaces "default" | uniq }}

{{- range $index, $ns := $namespaces }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ if eq $ns "default" }}letsencrypt-wildcard-cert{{ else }}letsencrypt-wildcard-cert-{{ $ns }}{{ end }}
  namespace: {{ $ns }}
spec:
  secretName: letsencrypt-wildcard-tls
  {{- if and $.Values.letsEncrypt.reflector.enable (eq $ns "default") }}
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "{{ join "," $namespaces }}"
  {{- end }}
  issuerRef:
    name: {{ $.Values.letsEncrypt.issuerName }}
    kind: ClusterIssuer
  dnsNames:
    - "*.{{ $.Values.letsEncrypt.domain }}"
    - "{{ $.Values.letsEncrypt.domain }}"
---
{{- end }}

{{- end }}