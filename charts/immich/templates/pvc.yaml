{{- if .Values.server.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "immich.fullname" . }}-uploads
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.server.persistence.accessModes | nindent 4 }}
  {{- if .Values.server.persistence.useExistingPersistentVolume }}
  volumeName: {{ include "immich.fullname" . }}-uploads-pv
  storageClassName: {{ .Values.server.persistence.storageClass | default "manual" }}
  {{- else }}
  storageClassName: {{ .Values.server.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.server.persistence.size }}
{{- end }}
{{- if and .Values.machineLearning.enabled .Values.machineLearning.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "immich.fullname" . }}-ml-cache
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.machineLearning.persistence.accessModes | nindent 4 }}
  {{- if .Values.machineLearning.persistence.useExistingPersistentVolume }}
  volumeName: {{ include "immich.fullname" . }}-ml-cache-pv
  {{- end }}
  {{- with .Values.machineLearning.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.machineLearning.persistence.size }}
{{- end }}
