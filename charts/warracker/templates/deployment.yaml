apiVersion: apps/v1
kind: Deployment
metadata:
  name: warracker
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: warracker
  template:
    metadata:
      labels:
        app: warracker
    spec:
      initContainers:
        - name: install-ca
          image: debian:stable-slim
          command:
            - sh
            - -c
            - |
              apt-get update && apt-get install -y ca-certificates
              cp /tmp/root-ca.crt /usr/local/share/ca-certificates/root-ca.crt
              update-ca-certificates
              cp -r /etc/ssl/certs/* /certs/
          volumeMounts:
            - name: trusted-ca
              mountPath: /tmp/root-ca.crt
              subPath: tls.crt
            - name: ca-bundle
              mountPath: /certs
      containers:
        - name: warracker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.deployment.containerPort }}
          envFrom:
            - secretRef:
                name: warracker-db
            - secretRef:
                name: warracker-oidc
          env:
            - name: DB_HOST
              value: {{ .Values.postgresql.host | default "warracker-postgres" }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgresql.database | quote }}
            {{- if .Values.deployment.oidc.enabled }}
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_PROVIDER_NAME
              value: {{ .Values.deployment.oidc.providerName }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.deployment.oidc.issuerUrl | quote }}
            - name: OIDC_SCOPE
              value: "{{ .Values.deployment.oidc.scope }}"
            {{- end }}
            {{- range $key, $value := .Values.deployment.additionalEnv }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          volumeMounts:
            - mountPath: /data/uploads
              name: uploads-storage
            - name: ca-bundle
              mountPath: /etc/ssl/certs
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
          command:
            - /app/entrypoint.sh
          args:
            - /usr/bin/supervisord
            - -c
            - /etc/supervisor/conf.d/supervisord.conf
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: warracker-uploads-pvc
        - name: trusted-ca
          secret:
            secretName: warracker-trusted-ca
        - name: ca-bundle
          emptyDir: {}