certificates:
  - name: calibre-web-dev
    namespace: calibre-web
    duration: 8760h
    renewBefore: 720h
  - name: home-assistant-dev
    namespace: home-assistant
    duration: 8760h
    renewBefore: 720h
    domain: internal.org
letsEncrypt:
  enable: true
  issuerName: letsencrypt-production
  server: https://acme-v02.api.letsencrypt.org/directory
  namespaces:
    - calibre-web
    - home-assistant